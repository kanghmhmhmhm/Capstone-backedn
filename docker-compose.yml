services:
  mysql:
    image: mysql:8.4
    container_name: pronunciation-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pronunciation
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    ports:
      # Host 3306 is often used by local MySQL. Use 3307 to avoid conflicts.
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
