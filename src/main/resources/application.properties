spring.application.name=pronunciationdemo

# --- DB (dev) ---
# docker-compose mysql is exposed on host port 3307
spring.datasource.url=jdbc:mysql://localhost:3307/pronunciation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA (dev) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- JWT (dev) ---
# 운영에서는 절대 하드코딩하지 말고 환경변수/시크릿으로 주입하세요.
app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_DEV_SECRET_32BYTES_MINIMUM}
app.jwt.access-token-ttl-seconds=3600

# --- CORS ---
# 프론트를 별도 도메인/포트에서 운영할 때만 설정이 필요합니다.
# 예) app.cors.allowed-origin-patterns=https://my-frontend.example.com,http://localhost:5173
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
